<script>
    // spinner to indicate page is loading
    document.addEventListener('DOMContentLoaded', function () {
        var loadingSpinner = document.getElementById('loadingSpinner');

        // Show spinner on page load
        window.addEventListener('load', function () {
            loadingSpinner.classList.add('visually-hidden');
        });

        // Show spinner when navigating away (e.g., clicking a link)
        window.addEventListener('beforeunload', function () {
            loadingSpinner.classList.remove('visually-hidden');
        });
    });
</script>

<script>
    // banner layout toggler
    var toggleLink = document.getElementById('toggleLink');
    if (toggleLink) {
        toggleLink.addEventListener('click', function (event) {
            event.preventDefault();
            var searchParams = new URLSearchParams(window.location.search);
            var defaultLayout = "vertical";
            var currentLayout = searchParams.get('layout')
            var selectedLayout;
            if (!currentLayout || currentLayout === 'vertical') {
                // Update the href attribute with the modified search string as the target Icon
                searchParams.set("layout", 'horizontal');
                toggleLink.href = window.location.pathname + "?" + searchParams.toString();
                window.location.href = toggleLink.href;  // Navigate to the modified URL
            } else {
                // Update the href attribute with the modified search string as the target Icon
                searchParams.set("layout", 'vertical');
                toggleLink.href = window.location.pathname + "?" + searchParams.toString();
                window.location.href = toggleLink.href;  // Navigate to the modified URL
            }
        });
    }

    // banner theme toggler (Tabler 1.4.0 compatible - no page reload)
    // Syncs with Theme Settings offcanvas panel
    var darkThemeLink = document.getElementById("enable-dark-theme");
    if (darkThemeLink) {
        darkThemeLink.addEventListener("click", function (event) {
            event.preventDefault();
            localStorage.setItem("tabler-theme", "dark");
            document.documentElement.setAttribute("data-bs-theme", "dark");
            // Sync with Settings offcanvas radio if open
            var settingsForm = document.getElementById("offcanvasSettings");
            if (settingsForm) {
                var radio = settingsForm.querySelector('[name="theme"][value="dark"]');
                if (radio) radio.checked = true;
            }
            var searchParams = new URLSearchParams(window.location.search);
            searchParams.set("theme", "dark");
            var newUrl = window.location.pathname + "?" + searchParams.toString();
            window.history.replaceState({path: newUrl}, "", newUrl);
        });
    }

    var lightThemeLink = document.getElementById("enable-light-theme");
    if (lightThemeLink) {
        lightThemeLink.addEventListener("click", function (event) {
            event.preventDefault();
            localStorage.setItem("tabler-theme", "light");
            document.documentElement.removeAttribute("data-bs-theme");
            // Sync with Settings offcanvas radio if open
            var settingsForm = document.getElementById("offcanvasSettings");
            if (settingsForm) {
                var radio = settingsForm.querySelector('[name="theme"][value="light"]');
                if (radio) radio.checked = true;
            }
            var searchParams = new URLSearchParams(window.location.search);
            searchParams.set("theme", "light");
            var newUrl = window.location.pathname + "?" + searchParams.toString();
            window.history.replaceState({path: newUrl}, "", newUrl);
        });
    }
</script>
